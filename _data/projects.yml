- name: Namna
  tagline: Private financial planning app for Filipinos on iPhone
  description: Private, local-first iPhone app that estimates when your current savings and future monthly contributions may be enough. Compare What If changes, add MP2/PERA/RTBs/SSS/GSIS manually, and keep everything on device.
  date: 2026-04-18
  tech:
    - React Native
    - Expo
    - TypeScript
    - SQLite
  status: Live on the App Store · ₱99 one-time
  highlights:
    - Current plan estimate built around take-home pay and Money Today
    - Presets for MP2, PERA, PSE, RTBs, SSS, GSIS, and more
    - What If changes for tuition, repairs, family support, and savings shifts
    - Automatic local snapshots and progress history on the same phone
    - Excel workbook export for records or sharing only — not restore
    - English and Filipino throughout
    - All data stays on the device — SQLite, no backend
