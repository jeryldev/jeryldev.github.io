# Jekyll configuration for GitHub Pages
title: jeryldev
description: Builder. Problem Solver. Perpetually Curious.
url: "https://jeryldev.github.io"
baseurl: ""

# Build settings
markdown: kramdown
theme: null  # We're using custom CSS

# Pagination
paginate: 6
paginate_path: "/blog/page:num/"
plugins:
  - jekyll-paginate

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Jeryl Donato Estopace"

# Exclude files from processing
exclude:
  - README.md
  - .gitignore