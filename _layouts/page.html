---
layout: default
---
<article class="page-single">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>

<style>
  .page-single {
    max-width: var(--width-prose);
    margin: 0 auto;
    padding: var(--space-8) var(--space-4) var(--space-10);
  }

  .page-header {
    margin-bottom: var(--space-6);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border);
  }

  .page-header h1 {
    font-family: "Geist", sans-serif;
    font-size: clamp(1.875rem, 4vw, 2.5rem);
    line-height: 1.15;
    letter-spacing: -0.028em;
    color: var(--secondary);
    margin: 0;
    font-weight: 600;
  }

  .page-content {
    font-family: "Geist", sans-serif;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
  }

  .page-content > p,
  .page-content > ul,
  .page-content > ol,
  .page-content > blockquote,
  .page-content > pre,
  .page-content > table {
    margin-bottom: 1.35rem;
  }

  .page-content h2 {
    font-family: "Geist", sans-serif;
    font-size: 1.5rem;
    line-height: 1.25;
    letter-spacing: -0.022em;
    color: var(--secondary);
    margin-top: 2.5rem;
    margin-bottom: 0.85rem;
    font-weight: 600;
  }

  .page-content h3 {
    font-family: "Geist", sans-serif;
    font-size: 1.1875rem;
    line-height: 1.3;
    letter-spacing: -0.018em;
    color: var(--secondary);
    margin-top: 1.875rem;
    margin-bottom: 0.6rem;
    font-weight: 600;
  }

  .page-content h4 {
    font-family: "Geist", sans-serif;
    font-size: 1rem;
    line-height: 1.35;
    color: var(--secondary);
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .page-content a {
    color: var(--primary);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 0.2em;
    transition: color 0.15s ease;
  }

  .page-content a:hover {
    color: var(--primary-hover);
  }

  .page-content blockquote {
    font-family: "Geist", sans-serif;
    font-size: 0.9375rem;
    line-height: 1.65;
    color: var(--text-secondary);
    border-left: 2px solid var(--border);
    padding: 0.25rem 0 0.25rem 1.25rem;
    margin: 1.75rem 0;
  }

  .page-content blockquote p {
    margin: 0 0 0.5rem;
  }

  .page-content blockquote p:last-child {
    margin-bottom: 0;
  }

  .page-content code {
    font-family: "Geist Mono", monospace;
    font-size: 0.92em;
    background: var(--code-bg);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    color: var(--secondary);
  }

  .page-content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
    margin: 1.75rem 0;
    line-height: 1.55;
    font-size: 0.875rem;
  }

  .page-content pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }

  .page-content table {
    font-family: "Geist", sans-serif;
    font-size: 0.9375rem;
    border-collapse: collapse;
    width: 100%;
    margin: 1.75rem 0;
  }

  .page-content th,
  .page-content td {
    border-bottom: 1px solid var(--border);
    padding: 0.65rem 0.85rem;
    text-align: left;
    vertical-align: top;
  }

  .page-content th {
    font-weight: 600;
    color: var(--secondary);
    border-bottom: 2px solid var(--secondary);
    font-size: 0.8125rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .page-content ul,
  .page-content ol {
    padding-left: 1.5rem;
  }

  .page-content li {
    margin: 0.35rem 0;
    line-height: 1.65;
  }

  .page-content li::marker {
    color: var(--primary);
  }

  .page-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2.5rem 0;
  }

  .page-content strong {
    font-weight: 600;
    color: var(--secondary);
  }

  .page-content em {
    font-style: italic;
    color: var(--secondary);
  }
</style>
