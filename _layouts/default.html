<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}" />
    <meta name="author" content="{{ site.author.name }}" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}" />
    <meta property="og:image" content="{{ site.author.image | absolute_url }}" />
    <meta property="og:site_name" content="{{ site.title }}" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@{{ site.author.twitter }}" />
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}" />
    <meta name="twitter:image" content="{{ site.author.image | absolute_url }}" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="{{ '/images/favicon.ico' | relative_url }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/images/favicon-16x16.png' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon.png' | relative_url }}" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | absolute_url }}" />

    <!-- Preload critical assets -->
    <link rel="preload" href="{{ '/styles.css' | relative_url }}" as="style" />
    <link rel="preload" href="{{ '/images/jeryl.jpg' | relative_url }}" as="image" />

    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    <script src="{{ '/script.js' | relative_url }}" defer></script>
  </head>
  <body{% if page.title == 'Home' %} class="homepage"{% endif %}>
    <header>
      <div class="container nav-container">
        <a href="{{ '/' | relative_url }}" class="nav-brand">jeryldev</a>
        <nav>
          <ul>
            <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
            <li><a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a></li>
            <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
            <li><a href="{{ '/uses/' | relative_url }}"{% if page.url contains '/uses' %} class="active"{% endif %}>Uses</a></li>
            <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains '/contact' %} class="active"{% endif %}>Contact</a></li>
          </ul>
        </nav>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <div class="container">
        <p>&copy; 2026 {{ site.title }}</p>
        <p class="footer-credit">Built with HTML, CSS, JavaScript, and Jekyll</p>
      </div>
    </footer>
  </body>
</html>
