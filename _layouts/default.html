<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />

    <!-- SEO: jekyll-seo-tag handles title, description, Open Graph, Twitter Card, JSON-LD, canonical -->
    {% seo %}

    <!-- Favicons — SVG primary (modern browsers), .ico fallback for legacy -->
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" />
    <link rel="icon" type="image/x-icon" href="{{ '/images/favicon.ico' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon.png' | relative_url }}" />

    <!-- RSS Feed (jekyll-feed injects its own, but this link is helpful as a stable alias) -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />

    <!-- Preload critical assets -->
    <link rel="preload" href="{{ '/styles.css' | relative_url }}" as="style" />
    <link rel="preload" href="{{ '/images/jeryl.jpg' | relative_url }}" as="image" />

    <!-- Engineer's Notebook: Geist + Geist Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" />

    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    <script src="{{ '/script.js' | relative_url }}" defer></script>
  </head>
  <body{% if page.title == 'Home' %} class="homepage"{% endif %}>
    <header>
      <div class="container nav-container">
        <a href="{{ '/' | relative_url }}" class="nav-brand">jeryldev</a>
        <nav>
          <ul>
            <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
            <li><a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a></li>
            <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
            <li><a href="{{ '/uses/' | relative_url }}"{% if page.url contains '/uses' %} class="active"{% endif %}>Uses</a></li>
            <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains '/contact' %} class="active"{% endif %}>Contact</a></li>
          </ul>
        </nav>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <div class="container">
        <div class="footer-inner">
          <p>&copy; 2026 {{ site.title }}</p>
          <p class="footer-credit">Built with HTML, CSS, JavaScript, and Jekyll</p>
        </div>
      </div>
    </footer>
  </body>
</html>
